<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PLANET TURBO — HAND VJ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05060d; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  #hud {
    position: fixed; top: 16px; left: 16px; color: #8ff; z-index: 10;
    text-shadow: 0 0 8px rgba(80,255,255,.6); line-height: 1.5; font-size: 13px;
    pointer-events: none; user-select: none;
  }
  #hud b { color: #fff; }
  #boostwrap { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; user-select: none; }
  #boostlabel { color:#ffe24a; font-size:15px; font-weight:900; letter-spacing:3px; font-family:'Courier New',monospace;
    text-shadow: 2px 2px 0 #b02000, -1px -1px 0 #b02000, 0 0 10px #ff7a00; margin-bottom:5px; font-style:italic; }
  #boostsegs { display:flex; gap:3px; transform: skewX(-13deg); padding:3px; }
  .seg { width:24px; height:22px; background:#140a1c; border:2px solid #000;
    box-shadow: inset 0 0 0 2px #2a1838; image-rendering:pixelated; }
  .seg.on { box-shadow: inset 0 -3px 0 rgba(255,255,255,.35), inset 0 3px 0 rgba(0,0,0,.35), 0 0 8px currentColor;
    animation: segpop .16s steps(3) 1; }
  @keyframes segpop { 0%{ transform:scaleY(1.7); filter:brightness(3) saturate(1.5); } 100%{ transform:scaleY(1); filter:brightness(1); } }
  #boostsegs.max { animation: maxshake .09s steps(2) infinite; }
  #boostsegs.max .seg.on { animation: maxflash .14s steps(2) infinite; }
  @keyframes maxflash { 0%{ filter:brightness(1); } 50%{ filter:brightness(2.6) saturate(1.6); } 100%{ filter:brightness(1); } }
  @keyframes maxshake { 0%{ transform:skewX(-13deg) translate(-1.5px,0); } 100%{ transform:skewX(-13deg) translate(1.5px,0); } }
  #combo { position:fixed; top:130px; right:48px; z-index:10; text-align:right; pointer-events:none;
    font-family:'Courier New',monospace; font-weight:900; font-style:italic; opacity:0;
    transition:opacity .35s; }
  #combo .num { font-size:60px; line-height:.9; color:#fff;
    text-shadow: 4px 4px 0 #b02000, -1px -1px 0 #b02000, 0 0 18px #ff7a00; }
  #combo .lbl { font-size:24px; letter-spacing:4px; color:#ffe24a;
    text-shadow: 2px 2px 0 #b02000, 0 0 10px #ff7a00; }
  #combo.show { animation: combopop .26s cubic-bezier(.2,1.6,.4,1); }
  @keyframes combopop { 0%{ transform:scale(1.8) rotate(-5deg); } 60%{ transform:scale(.92) rotate(2deg); } 100%{ transform:scale(1) rotate(0); } }
  #flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:9; }
  #flash.on { animation: flashfx .4s ease-out; }
  @keyframes flashfx { 0%{ opacity:.9; } 100%{ opacity:0; } }
  #speed { color: #fc6; }
  #center { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 26px; height: 26px; z-index: 10; pointer-events: none; opacity: .5; }
  #center:before, #center:after { content: ""; position: absolute; background: #8ff; box-shadow: 0 0 6px #0ff; }
  #center:before { left: 12px; top: 0; width: 2px; height: 26px; }
  #center:after  { top: 12px; left: 0; height: 2px; width: 26px; }
  #fader {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 10;
    color: #8ff; text-shadow: 0 0 8px rgba(80,255,255,.6); font-size: 12px; text-align: center; user-select: none;
    background: rgba(5,10,20,.45); border: 1px solid #245; border-radius: 8px; padding: 8px 14px; backdrop-filter: blur(4px);
  }
  #fader label { display: block; margin-bottom: 6px; letter-spacing: .5px; }
  #fader b { color: #fff; }
  #density { -webkit-appearance: none; appearance: none; width: 260px; height: 6px; border-radius: 3px; background: linear-gradient(90deg,#055,#0ff); outline: none; }
  #density::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #0ff; box-shadow: 0 0 8px #0ff; cursor: pointer; border: 2px solid #fff; }
  #density::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: #0ff; box-shadow: 0 0 8px #0ff; cursor: pointer; border: 2px solid #fff; }
  #micbtn { margin-top: 8px; width: 100%; padding: 6px; cursor: pointer; background: rgba(0,40,40,.6); color: #0ff; border: 1px solid #0aa; border-radius: 6px; font-family: inherit; font-size: 12px; letter-spacing: .5px; }
  #micbtn:hover { background: rgba(0,80,80,.7); }
  #micbtn.on { background: rgba(80,20,40,.6); color: #f6a; border-color: #f48; }
  #micstat { color: #f86; }
  #micstat.on { color: #6f9; }
  #bins { display: flex; gap: 3px; justify-content: center; align-items: flex-end; height: 30px; margin-top: 8px; }
  #bins span { width: 18px; height: 4px; border-radius: 2px; transition: height .05s linear; }
</style>
</head>
<body>
<div id="hud">
  <div>WASD — 방향  ·  SPACE — 부스트</div>
</div>
<div id="boostwrap">
  <div id="boostlabel">≫ TURBO パワー ≪</div>
  <div id="boostsegs"></div>
</div>
<div id="combo"><div class="num">0</div><div class="lbl">COMBO</div></div>
<div id="flash"></div>
<div id="center"></div>
<div id="fader">
  <label>MAX DENSITY — <b><span id="densval">300</span></b>  ·  <span id="micstat">MIC OFF</span></label>
  <input id="density" type="range" min="0" max="800" value="300" step="10" />
  <button id="micbtn">🎤 START MIC</button>
  <div id="bins"></div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ============================ scene ============================
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x6aa6e0, 0.011);   // 하늘 중간톤에 맞춤 (오브젝트가 하늘에 녹아듦)

const camera = new THREE.PerspectiveCamera(92, innerWidth / innerHeight, 0.1, 12000);   // far 늘림 (큰 하늘돔)
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));   // 레티나 2x→1.5x (GPU 부담 ↓)
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ---- 블룸 후처리 ----
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth*0.5, innerHeight*0.5), 0.6, 0.5, 0.86);   // 블룸 half-res
composer.addPass(bloom);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloom.setSize(innerWidth*0.5, innerHeight*0.5);
});

// ===== 광활한 바다 위 하늘 =====
// 하늘 돔 — 환경 텍스처(그라데이션 + 구름), 바다보다 충분히 크게(단면 제거)
function makeSkyTexture(){
  const w=1024,h=512,c=document.createElement('canvas'); c.width=w; c.height=h; const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,h);            // top=천정 … bottom=수평선 아래
  g.addColorStop(0.00,'#1d5aae'); g.addColorStop(0.34,'#4f93d6');
  g.addColorStop(0.48,'#a6d2ef'); g.addColorStop(0.52,'#ffe6c0');   // 수평선 따뜻한 띠
  g.addColorStop(0.60,'#8ec2e2'); g.addColorStop(1.00,'#2b7bb2');
  x.fillStyle=g; x.fillRect(0,0,w,h);
  for (let i=0;i<26;i++){                             // 부드러운 구름 (상공)
    const cx=Math.random()*w, cy=h*(0.10+Math.random()*0.32), rw=50+Math.random()*140, rh=14+Math.random()*34;
    const cg=x.createRadialGradient(cx,cy,0,cx,cy,rw);
    cg.addColorStop(0,'rgba(255,255,255,'+(0.5+Math.random()*0.4)+')'); cg.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=cg; x.beginPath(); x.ellipse(cx,cy,rw,rh,0,0,7); x.fill();
  }
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; t.wrapS=THREE.RepeatWrapping; return t;
}
const skyGeo = new THREE.SphereGeometry(8000, 40, 24);
const sky = new THREE.Mesh(skyGeo, new THREE.MeshBasicMaterial({ map:makeSkyTexture(), side:THREE.BackSide, fog:false, depthWrite:false }));
sky.renderOrder = -2; scene.add(sky);

// 태양 (수평선 근처, 블룸으로 빛남)
const sun = new THREE.Mesh(new THREE.SphereGeometry(60, 20, 20), new THREE.MeshBasicMaterial({ color:0xfff0b0, fog:false }));
sun.renderOrder = -1; scene.add(sun);

// 바다 (큰 평면 + 셰이더 물결, 카메라 따라옴 = 무한)
const oceanGeo = new THREE.PlaneGeometry(6000, 6000, 140, 140); oceanGeo.rotateX(-Math.PI/2);
const oceanMat = new THREE.MeshStandardMaterial({ color:0x1f86c0, roughness:0.42, metalness:0.15, flatShading:true });
let oceanU = null;
oceanMat.onBeforeCompile = sh => {
  sh.uniforms.uTime = { value:0 }; sh.uniforms.uOff = { value:new THREE.Vector2() };
  oceanU = sh.uniforms;
  sh.vertexShader = 'uniform float uTime; uniform vec2 uOff;\n' + sh.vertexShader.replace(
    '#include <begin_vertex>',
    `vec3 transformed = vec3(position);
     float wx = position.x + uOff.x, wz = position.z + uOff.y;
     transformed.y += sin(wx*0.018 + uTime*1.4)*1.3 + cos(wz*0.022 + uTime*1.05)*1.1 + sin((wx+wz)*0.011 + uTime*0.7)*1.7;`
  );
};
const ocean = new THREE.Mesh(oceanGeo, oceanMat); ocean.position.y = -42; scene.add(ocean);

// ============================ lights ============================
scene.add(new THREE.AmbientLight(0x556688, 1.15));
scene.add(new THREE.HemisphereLight(0xcfe0ff, 0x5a4a6a, 0.55));   // 레트로 플랫 필
const key = new THREE.DirectionalLight(0xffffff, 1.35); key.position.set(3, 8, 4); scene.add(key);
const key2 = new THREE.DirectionalLight(0x88bbff, 0.4); key2.position.set(-4, 2, -3); scene.add(key2);  // 저렴한 보조광(포인트라이트 대체)

// ============================ plane (1인승 경비행기 + 지구 캐릭터 파일럿) ============================
const plane = new THREE.Group(); scene.add(plane);
const ship = new THREE.Group(); plane.add(ship);   // 시각적 뱅크(롤)용 내부 그룹 (전방 = -Z)

// 검정 외곽선 헬퍼 (메시 복제 + BackSide 검정)
function addOutlined(parent, geo, color, ox=1.12) {
  const m = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color, flatShading:true, roughness:0.6, metalness:0.0 }));
  parent.add(m);
  const o = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color:0x000000, side:THREE.BackSide }));
  o.scale.setScalar(ox); m.add(o);
  return m;
}
const BODY_C=0xe23c3c, WING_C=0xf0e2b0, TAIL_C=0xf0e2b0, ACC_C=0x2aa0c0;
// 동체
const fuselage = addOutlined(ship, new THREE.BoxGeometry(1.15, 1.0, 3.0), BODY_C, 1.06); fuselage.position.z = 0.1;
const nose = addOutlined(ship, new THREE.CylinderGeometry(0.5, 0.58, 0.7, 12), BODY_C, 1.1); nose.rotation.x = Math.PI/2; nose.position.set(0,0,-1.55);
// 낮은 날개 (캐릭터 안 가리게 동체 아래로)
const wing = addOutlined(ship, new THREE.BoxGeometry(5.4, 0.16, 1.1), WING_C, 1.05); wing.position.set(0, -0.12, -0.1);
// 콕핏 안장 (캐릭터가 앉는 자리)
const seatWell = addOutlined(ship, new THREE.CylinderGeometry(0.52, 0.44, 0.55, 16), 0x3a1414, 1.03); seatWell.position.set(0, 0.5, 0.1);
const seatRim  = new THREE.Mesh(new THREE.TorusGeometry(0.54, 0.1, 10, 22), new THREE.MeshStandardMaterial({ color:BODY_C, flatShading:true, roughness:0.6 }));
seatRim.rotation.x = Math.PI/2; seatRim.position.set(0, 0.78, 0.1); ship.add(seatRim);
const seatRimO = new THREE.Mesh(new THREE.TorusGeometry(0.54,0.1,10,22), new THREE.MeshBasicMaterial({ color:0x000000, side:THREE.BackSide })); seatRimO.scale.setScalar(1.1); seatRim.add(seatRimO);
// 꼬리
const fin  = addOutlined(ship, new THREE.BoxGeometry(0.16, 0.85, 0.7), BODY_C, 1.08); fin.position.set(0, 0.55, 1.45);
const stab = addOutlined(ship, new THREE.BoxGeometry(2.0, 0.14, 0.6), TAIL_C, 1.06); stab.position.set(0, 0.25, 1.5);
// 바퀴
for (const sx of [-0.62, 0.62]){ const w = addOutlined(ship, new THREE.CylinderGeometry(0.26,0.26,0.16,12), 0x222228, 1.12); w.rotation.z = Math.PI/2; w.position.set(sx,-0.72,-0.5); }
// 윈드스크린 (안장 앞)
const glass = new THREE.Mesh(new THREE.BoxGeometry(0.85,0.45,0.4), new THREE.MeshStandardMaterial({ color:0xbfe8ff, transparent:true, opacity:0.5, roughness:0.1, metalness:0.3 }));
glass.position.set(0,0.6,-0.55); glass.rotation.x = -0.35; ship.add(glass);
// 프로펠러 (앞코, 회전)
const prop = new THREE.Group(); prop.position.set(0,0,-1.95); ship.add(prop);
const hub = new THREE.Mesh(new THREE.SphereGeometry(0.16,8,8), new THREE.MeshStandardMaterial({color:0x222228})); prop.add(hub);
for (let b=0;b<2;b++){ const bl=new THREE.Mesh(new THREE.BoxGeometry(0.12,2.0,0.05), new THREE.MeshStandardMaterial({color:0x33333a})); bl.rotation.z=b*Math.PI/2; prop.add(bl); }

// 지구 캐릭터 파일럿(3D)은 buildGlobeHead/edgeTex 정의 이후에 생성됨 (아래 GLOBEHEAD 섹션 뒤)
let pilotHead = null, pilotRig = null, jumpT = 1;   // jumpT<1 이면 점프 진행중
let jumpH = 0.9, jumpTrick = 0, jumpDir = 1, jumpTurns = 1;  // 점프 높이/트릭종류/방향/회전수 (링마다 랜덤)
const flashEl = document.getElementById('flash');           // 셀카 플래시

// ============================ glove (instanced) ============================
const CUBE_COUNT = 800;
let maxDensity = 300, activeCount = 300;
const SPAWN_AHEAD = 170, SPAWN_RADIUS = 82, DESPAWN_BEHIND = 80;
const BEAT_PEAK = 1.8;                  // 크기 바운스 배율
const PAT_N = 8;                        // 8개 패턴
const PATTERN_COLORS = [0xff3b6b,0xff8a3b,0xffd23f,0x8aff3f,0x3fffd2,0x3f8aff,0x9b5bff,0xff5bd0];

// --- 미키 장갑손 지오메트리 한 번 구워서 merge ---
function paint(geo, r, g, b) {
  const n = geo.attributes.position.count, a = new Float32Array(n*3);
  for (let i=0;i<n;i++){ a[i*3]=r; a[i*3+1]=g; a[i*3+2]=b; }
  geo.setAttribute('color', new THREE.BufferAttribute(a,3));
  return geo;
}
const _q = new THREE.Quaternion(), _e = new THREE.Euler(), _m4 = new THREE.Matrix4(), _one = new THREE.Vector3(1,1,1);
function segment(joint, ex, ez, geo) {           // 관절에서 굽혀 배치된 캡슐 한 마디
  _e.set(ex, 0, ez || 0); _q.setFromEuler(_e);
  const dir = new THREE.Vector3(0,1,0).applyQuaternion(_q);
  const half = geo.parameters.length/2 + geo.parameters.radius;
  const center = joint.clone().addScaledVector(dir, half);
  _m4.compose(center, _q, _one);
  const g2 = geo.clone(); g2.applyMatrix4(_m4); paint(g2,1,1,1);
  return { g: g2, end: joint.clone().addScaledVector(dir, 2*half) };
}
function buildGloveGeometry() {
  const geos = [];
  const palm = new THREE.SphereGeometry(0.8, 14, 10); palm.scale(1, 0.85, 0.58); paint(palm,1,1,1); geos.push(palm);
  const cuff = new THREE.CylinderGeometry(0.62, 0.82, 0.5, 14); cuff.translate(0,-0.62,0); paint(cuff,0.05,0.05,0.08); geos.push(cuff);
  const prox = new THREE.CapsuleGeometry(0.17, 0.4, 3, 7);
  const dist = new THREE.CapsuleGeometry(0.15, 0.28, 3, 7);
  for (const x of [-0.44, 0, 0.44]) {            // 손가락 3개, 살짝 굽힘
    const s1 = segment(new THREE.Vector3(x, 0.52, -0.1), -0.5, 0, prox); geos.push(s1.g);
    const s2 = segment(s1.end, -1.15, 0, dist); geos.push(s2.g);
  }
  const tprox = new THREE.CapsuleGeometry(0.19, 0.32, 3, 7);  // 엄지
  const t1 = segment(new THREE.Vector3(-0.66, 0.05, -0.1), -0.2, 0.95, tprox); geos.push(t1.g);
  const t2 = segment(t1.end, -0.5, 0.95, dist); geos.push(t2.g);
  return mergeGeometries(geos, false);
}

// --- 나머지 7개 캐릭터 파츠 (front = -Z, lookAt 으로 카메라 향함) ---
// PICO-8 풍 레트로 팔레트
const C_W=[1.0,0.945,0.91], C_K=[0.10,0.10,0.20];
const C_R=[1.0,0.0,0.30], C_Y=[1.0,0.925,0.15], C_PINK=[1.0,0.467,0.66], C_ORG=[1.0,0.64,0.0], C_BLU=[0.16,0.68,1.0], C_CY=[0.18,0.82,0.75];
const P = (geo,c) => paint(geo, c[0], c[1], c[2]);

function buildFoot() {            // 발 / 만화 신발
  const g=[];
  const body=new THREE.CapsuleGeometry(0.5,0.9,4,8); body.rotateX(Math.PI/2); body.translate(0,0,-0.15); g.push(P(body,C_W));
  const sole=new THREE.BoxGeometry(0.98,0.22,1.95); sole.translate(0,-0.5,-0.15); g.push(P(sole,C_BLU));
  const ankle=new THREE.CylinderGeometry(0.34,0.42,0.55,10); ankle.translate(0,0.32,0.6); g.push(P(ankle,C_W));
  return mergeGeometries(g,false);
}
function buildEye() {             // 눈
  const g=[];
  g.push(P(new THREE.SphereGeometry(0.9,16,12), C_W));
  const ir=new THREE.SphereGeometry(0.44,12,10); ir.translate(0,-0.05,-0.62); g.push(P(ir,C_K));
  const hl=new THREE.SphereGeometry(0.13,8,8); hl.translate(-0.2,0.18,-0.92); g.push(P(hl,C_W));
  return mergeGeometries(g,false);
}
function buildEar() {             // 귀 (네온 핑크)
  const e=new THREE.SphereGeometry(0.95,16,12); e.scale(1,1,0.42);
  return mergeGeometries([P(e,C_PINK)],false);
}
function buildNose() {           // 코 (네온 오렌지)
  const g=[];
  const n=new THREE.SphereGeometry(0.62,16,12); n.scale(1.25,0.92,0.95); g.push(P(n,C_ORG));
  const hl=new THREE.SphereGeometry(0.12,8,8); hl.translate(-0.22,0.24,-0.5); g.push(P(hl,C_W));
  return mergeGeometries(g,false);
}
function buildMouth() {          // 입 (스마일)
  const g=[];
  const t=new THREE.TorusGeometry(0.7,0.2,8,18,Math.PI); t.rotateZ(Math.PI); g.push(P(t,C_R));
  for (const x of [-0.32,0,0.32]){ const tooth=new THREE.BoxGeometry(0.22,0.18,0.2); tooth.translate(x,0.04,-0.02); g.push(P(tooth,C_W)); }
  return mergeGeometries(g,false);
}
function buildHeart() {          // 하트
  const g=[];
  const l=new THREE.SphereGeometry(0.44,12,10); l.translate(-0.33,0.3,0); g.push(P(l,C_R));
  const r=new THREE.SphereGeometry(0.44,12,10); r.translate(0.33,0.3,0); g.push(P(r,C_R));
  const tip=new THREE.ConeGeometry(0.66,1.15,18); tip.rotateX(Math.PI); tip.translate(0,-0.32,0); g.push(P(tip,C_R));
  const m=mergeGeometries(g,false); m.scale(1,1,0.6); return m;
}
function buildStar() {           // 별
  const g=[]; g.push(P(new THREE.SphereGeometry(0.32,12,10), C_Y));

// --- 링 패스 좌표계 (placeHand가 경로를 비우는 데 써서 objects보다 먼저 선언) ---
const worldUp = new THREE.Vector3(0,1,0), _unitZ = new THREE.Vector3(0,0,1);
const pathOrigin = new THREE.Vector3(), pathFwd = new THREE.Vector3(0,0,-1), pathRight = new THREE.Vector3(1,0,0), pathUp = new THREE.Vector3(0,1,0);
function undul(s){ return { lat: Math.sin(s*0.012)*22 + Math.sin(s*0.028)*7, ver: Math.sin(s*0.015)*13 + Math.sin(s*0.022)*5 }; }
const _phTmp = new THREE.Vector3(), _phCl = new THREE.Vector3(), _phOff = new THREE.Vector3();
const RING_CLEAR = 24;   // 링 패스 주변 이 반경 안엔 오브젝트 없음

// 오브젝트 배치 — 하늘에 넓게 랜덤, 단 링 패스 경로(코리도)는 비움
function placeHand(h, dist) {
  const dir = new THREE.Vector3(0,0,-1).applyQuaternion(plane.quaternion);
  const p = plane.position.clone().addScaledVector(dir, dist);
  p.x += (Math.random()*2-1) * 150;          // 좌우로 넓게 (월드 기준 = 비행기 기울여도 수평)
  p.y += (Math.random()*2-1) * 85;           // 위아래로 넓게
  p.z += (Math.random()*2-1) * 40;
  // 링 패스 중심선에서 RING_CLEAR 안쪽이면 → 바깥으로 밀어내 경로를 비움
  const s = _phTmp.copy(p).sub(pathOrigin).dot(pathFwd);
  const u = undul(s);
  _phCl.copy(pathOrigin).addScaledVector(pathFwd, s).addScaledVector(pathRight, u.lat).addScaledVector(pathUp, u.ver);
  _phOff.copy(p).sub(_phCl); const fc = _phOff.dot(pathFwd); _phOff.addScaledVector(pathFwd, -fc);   // 수직 오프셋
  const od = _phOff.length();
  if (od < RING_CLEAR){
    if (od < 0.01) _phOff.copy(pathRight); else _phOff.normalize();
    p.copy(_phCl).addScaledVector(pathFwd, fc).addScaledVector(_phOff, RING_CLEAR + Math.random()*120);
  }
  h.pos.copy(p);   // pop은 안 건드림 (재배치해도 풀사이즈, 포그가 거리로 드러냄)
}

// --- GLOBEHEAD: 화난 지구본 (복셀 블록) — 형제게임 babymaya/Globehead-game 오마주 ---
function buildGlobeHead() {
  const g=[], s=0.42, R=3.05;
  const OCEAN=[0.16,0.68,1.0], LAND=[0.0,0.89,0.21], INK=[0.10,0.10,0.20], WH=[1.0,0.945,0.91], RED=[1.0,0.0,0.30];
  const box=(x,y,z,c,sz)=>{ const b=new THREE.BoxGeometry(sz||s,sz||s,sz||s); b.translate(x,y,z); g.push(P(b,c)); };
  for (let ix=-3;ix<=3;ix++) for (let iy=-3;iy<=3;iy++) for (let iz=-3;iz<=3;iz++){
    const d=Math.sqrt(ix*ix+iy*iy+iz*iz); if (d>R) continue;
    if (d < R-1.0 && iz > -2) continue;            // 껍데기만 (앞면은 채워서 얼굴 받침)
    const land=(Math.sin(ix*1.3)+Math.cos(iy*1.1)+Math.sin(iz*0.9))>0.9;
    box(ix*s, iy*s, iz*s, land?LAND:OCEAN);
  }
  const fz=-3*s-0.05;                              // 앞면(-Z) = 카메라쪽
  for (const ex of [-0.55,0.55]){ box(ex,0.25,fz,WH,s*1.4); box(ex,0.10,fz-0.18,INK,s*0.7); } // 눈+동공
  box(-0.55,0.78,fz,INK,s*0.9); box(-0.2,0.55,fz,INK,s*0.9); box(0.2,0.55,fz,INK,s*0.9); box(0.55,0.78,fz,INK,s*0.9); // 화난 눈썹
  box(-0.5,-0.7,fz,INK,s*0.8); box(-0.15,-0.55,fz,INK,s*0.8); box(0.2,-0.7,fz,INK,s*0.8); box(0.5,-0.6,fz,INK,s*0.8);  // 삐죽 입
  box(1.45,0.95,-0.5,RED,s*0.5); box(1.65,0.7,-0.5,RED,s*0.5); box(1.3,0.7,-0.5,RED,s*0.5); // 빨강 분노마크
  return mergeGeometries(g,false);
}

function placeRingAt(r, s){
  r.s = s; r.passed = false; r.portal = 0;
  const u = undul(s);
  _rp.copy(pathOrigin).addScaledVector(pathFwd, s).addScaledVector(pathRight, u.lat).addScaledVector(pathUp, u.ver);
  r.pos.copy(_rp); r.mesh.position.copy(_rp);
  r.mesh.quaternion.setFromUnitVectors(_unitZ, pathFwd);   // 링이 패스 진행방향을 향함
  r.mesh.scale.setScalar(1); r.mesh.material.opacity = 1;
  r.mesh.material.color.setHex(0xffe24a); r.mesh.material.emissive.setHex(0xffaa10);
}
function regenPath(){   // 현재 비행기 위치·방향에서 새 패스
  pathOrigin.copy(plane.position);
  pathFwd.set(0,0,-1).applyQuaternion(plane.quaternion).normalize();
  pathRight.crossVectors(pathFwd, worldUp).normalize();
  pathUp.crossVectors(pathRight, pathFwd).normalize();
  let s = RING_GAP*1.5;
  for (const r of rings){ placeRingAt(r, s); s += RING_GAP; }
  ringHeadS = s - RING_GAP; lastS = 0;
}

async function startMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false } });
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const src = ctx.createMediaStreamSource(stream);
    analyser = ctx.createAnalyser(); analyser.fftSize = 2048; analyser.smoothingTimeConstant = 0.5;
    src.connect(analyser);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    // mel 간격으로 8개 빈 경계 (40Hz ~ Nyquist)
    const hz2mel = h => 2595*Math.log10(1+h/700), mel2hz = m => 700*(10**(m/2595)-1);
    const binHz = ctx.sampleRate / analyser.fftSize;
    const mMin = hz2mel(40), mMax = hz2mel(ctx.sampleRate/2);
    binEdges = [];
    for (let k=0;k<=PAT_N;k++) binEdges.push(Math.floor(mel2hz(mMin+(mMax-mMin)*k/PAT_N)/binHz));
    audioActive = true;
    micBtn.classList.add('on'); micBtn.textContent = '🎤 MIC LIVE';
    micStat.textContent = 'MIC LIVE'; micStat.classList.add('on');
  } catch (e) { micStat.textContent = 'MIC DENIED'; console.error(e); }
}
micBtn.addEventListener('click', () => { if (!audioActive) startMic(); });

function audioTick() {
  if (!audioActive) { activeCount = maxDensity; for (let k=0;k<PAT_N;k++) reaction[k] *= 0.9; return; }
  analyser.getByteFrequencyData(freqData);
  let energy = 0;
  for (let k=0;k<PAT_N;k++){
    let sum = 0, n = 0;
    for (let b=binEdges[k]; b<binEdges[k+1]; b++){ const v=freqData[b]/255; sum += v*v; n++; }
    const rms = n>0 ? Math.sqrt(sum/n) : 0;
    const t = k/(PAT_N-1);                         // 0=로우 … 1=하이
    const atk = 0.45 + 0.45*t;                     // 어택: 로우 0.45 → 하이 0.90
    const rel = 0.04 + 0.34*t;                     // 릴리즈: 로우 0.04(부드럽) → 하이 0.38(날카롭)
    const coef = rms > binEnv[k] ? atk : rel;      // 비대칭 (오를땐 빠르게, 내릴땐 ease-out)
    binEnv[k] += (rms - binEnv[k]) * coef;
    reaction[k] = Math.min(1, binEnv[k] * 2.4);    // 게인
    energy += binEnv[k];
  }
  // 밀도는 꽉 유지 (오디오는 크기/반짝임만 구동)
  activeCount = maxDensity;
  // 저역 온셋 → 비트 플래시 (블룸 번쩍)
  const low = (binEnv[0]+binEnv[1])*0.5;
  const flux = Math.max(0, low - prevLow); prevLow = low;
  const now = performance.now()*0.001;
  if (flux > 0.03 && low > 0.18 && now - lastBeat > 0.16){ beatFlash = 1; lastBeat = now; }
}

// ============================ update ============================
const dummy = new THREE.Object3D(), _v = new THREE.Vector3(), _right = new THREE.Vector3(), _up = new THREE.Vector3(), _aim = new THREE.Object3D();
function update(dt) {
  audioTick();

  // boost (수동, SPACE)
  boosting = !!keys['Space'] && boost > 0.02;
  boost = boosting ? Math.max(0, boost - dt*0.5) : Math.min(BOOST_MAX, boost + dt*0.18);
  speed += (((autopilot||boosting) ? boostSpeed : baseSpeed) - speed)*0.06;   // 오토파일럿/부스트시 빠르게

  if (autopilot){
    // ===== 치트(E): 레일 — 패스 위에 직접 올려놓고 전진 (절대 안 헤맴, 모든 링 관통) =====
    cheatS += speed*dt*60;                                                  // 패스를 따라 전진
    const u = undul(cheatS);
    plane.position.copy(pathOrigin).addScaledVector(pathFwd, cheatS).addScaledVector(pathRight, u.lat).addScaledVector(pathUp, u.ver);
    // Object3D.lookAt 는 +Z를 타겟으로 향하게 함(카메라와 반대) → 비행기 전방(-Z) 정렬하려면 "뒤쪽 점"을 찍어야 함
    const u2 = undul(cheatS - 10);
    _aimPt.copy(pathOrigin).addScaledVector(pathFwd, cheatS-10).addScaledVector(pathRight, u2.lat).addScaledVector(pathUp, u2.ver);
    _aim.position.copy(plane.position); _aim.up.set(0,1,0); _aim.lookAt(_aimPt);
    plane.quaternion.slerp(_aim.quaternion, Math.min(1, dt*6));             // 방향 정렬 (dt 평활화로 부드러움)
    bank += ((u2.lat - u.lat)*0.06 - bank) * 0.1;                           // 곡률 방향으로 살짝 기울임
    pitchV = 0;
  } else {
    // steering — 뱅크-투-턴 (수동)
    let tBank=0, tp=0;
    if (keys['KeyA']) tBank+=1; if (keys['KeyD']) tBank-=1;
    if (keys['KeyW']) tp-=1; if (keys['KeyS']) tp+=1;
    bank   += (tBank*0.7 - bank) * 0.07;
    pitchV += (tp*1.2*dt - pitchV) * 0.1;
    plane.rotateY(bank * 1.8 * dt);
    plane.rotateX(pitchV);
  }
  ship.rotation.z = bank * 1.1;               // 기체 시각적 롤(기울임)

  const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(plane.quaternion);
  _right.set(1,0,0).applyQuaternion(plane.quaternion); _up.set(0,1,0).applyQuaternion(plane.quaternion);
  if (!autopilot) plane.position.addScaledVector(fwd, speed*dt*60);   // 오토파일럿은 레일이 위치 설정
  prop.rotation.z += ((boosting||autopilot) ? 1.8 : 1.0);   // 프로펠러 회전 (부스트/오토시 빠르게)

  // beat flash from low bins
  const time = performance.now()*0.001;

  const lookBack = boosting || autopilot;                  // 부스트/오토파일럿 = 뒤돌아봄 (계속 부스트 중)
  lookBackAmt += ((lookBack?1:0) - lookBackAmt) * 0.1;     // 부드럽게 (카메라 줌인용)

  // 파일럿: 가끔 뒤돌아봄 + 선회시 얼굴 빼꼼 + 주먹 펌핑
  if (pilotRig){
    const { pilot, head, armR, armL } = pilotRig;
    const targetYaw = lookBack ? Math.PI : (bank*1.1 + Math.sin(time*1.3)*0.08);
    const targetPitch = lookBack ? -0.5 : (-pitchV*0.5 + Math.sin(time*0.8)*0.05);
    head.rotation.y += (targetYaw - head.rotation.y) * 0.08;
    head.rotation.x += (targetPitch - head.rotation.x) * 0.08;
    head.rotation.z = Math.sin(time*1.1)*0.04;
    // 주먹: 비트(저역)에 더 세게 펌핑
    const pump = 0.3 + 0.6*reaction[0];
    armR.pivot.rotation.z = -0.5 + Math.sin(time*5)*pump;
    armL.pivot.rotation.z = 1.2 + Math.sin(time*3+1)*0.12;
    // 링 통과 트릭! (매번 랜덤 — 백덤블링/공중제비/배럴롤/360/셀카/댄스/폴짝)
    if (jumpT < 1){
      jumpT = Math.min(1, jumpT + dt/0.6);
      const hop = Math.sin(jumpT*Math.PI);          // 0→1→0 (착지시 0)
      pilot.position.y = 0.62 + hop*jumpH;
      const full = Math.PI*2*jumpTurns*jumpT;       // 0→2π(×회전수), 착지=정면
      let rx=0, ry=0, rz=0;
      switch(jumpTrick){
        case 1: rx = -full; break;                                                   // 🤸 백덤블링
        case 2: rx =  full; break;                                                   // 앞공중제비
        case 3: rz = jumpDir*full; break;                                            // 배럴롤
        case 4: ry = jumpDir*full; break;                                            // 360 스핀
        case 5: head.rotation.y = Math.PI;                                           // 📸 셀카: 카메라 보기
                armR.pivot.rotation.z = -2.5; armL.pivot.rotation.z = 2.5; rz = Math.sin(jumpT*Math.PI)*0.15; break;  // 양팔 V
        case 6: rz = Math.sin(jumpT*Math.PI*5)*0.5; ry = Math.sin(jumpT*Math.PI*4)*0.4;  // 💃 댄스 흔들
                armR.pivot.rotation.z = -0.5 + Math.sin(jumpT*32)*1.1; armL.pivot.rotation.z = 1.2 + Math.sin(jumpT*32+3)*1.1; break;
        default: rz = hop*0.35*jumpDir;                                              // 기본 폴짝(살짝 기울임)
      }
      pilot.rotation.set(rx, ry, rz);
    } else {
      pilot.position.y += (0.62 - pilot.position.y)*0.2;
      pilot.rotation.set(0,0,0);                    // 착지 = 정면(회전 2π배수라 매끈)
    }
  }


  // ---- 8패턴 인스턴스 업데이트 ----
  const clamp01 = v => v<0?0:v>1?1:v;
  const activePer = Math.min(PER, Math.round(activeCount / PAT_N));
  for (let p=0;p<PAT_N;p++){
    const react = reaction[p], im = meshes[p], om = omeshes[p], arr = states[p];
    for (let j=0;j<PER;j++){
      const h = arr[j];
      const active = j < activePer;
      if (active && h.pop < 0.01) placeHand(h, SPAWN_AHEAD*0.8 + Math.random()*SPAWN_AHEAD*0.2);  // 새로 활성 → 멀리(포그 뒤)에서 등장
      const along = _v.copy(h.pos).sub(plane.position).dot(fwd);
      if (active && along < -DESPAWN_BEHIND) placeHand(h, SPAWN_AHEAD - Math.random()*30);           // 뒤로 가면 멀리 재배치
      h.pop = active ? 1 : h.pop*0.85;                                                               // 항상 풀사이즈 (포그가 거리에 따라 드러냄)
      if (!active && h.pop < 0.01) {                                                                 // 비활성 → 숨김
        dummy.position.copy(h.pos); dummy.quaternion.identity(); dummy.scale.setScalar(0.0001);
        dummy.updateMatrix(); im.setMatrixAt(j, dummy.matrix); om.setMatrixAt(j, dummy.matrix); continue;
      }
      const size = h.baseSize * h.pop * (1 + BEAT_PEAK * react);
      dummy.position.copy(h.pos);
      dummy.rotation.set(h.rx, h.ry + time*h.spin, h.rz);             // 고정 방향 + 천천히 자전 (월드 오브젝트처럼)
      dummy.scale.setScalar(Math.max(size, 0.0001));
      dummy.updateMatrix();
      im.setMatrixAt(j, dummy.matrix);
      dummy.scale.multiplyScalar(OUTLINE); dummy.updateMatrix(); om.setMatrixAt(j, dummy.matrix); // 외곽선
    }
    im.instanceMatrix.needsUpdate = true;
    om.instanceMatrix.needsUpdate = true;
  }

  // ---- GLOBEHEAD (손 사이사이, 전체 에너지 반응 + 갸웃) ----
  let avg=0; for (let k=0;k<PAT_N;k++) avg+=reaction[k]; avg/=PAT_N;
  const activeGlobe = Math.min(GLOBE_COUNT, Math.round(GLOBE_COUNT * (activeCount/CUBE_COUNT)));
  for (let j=0;j<GLOBE_COUNT;j++){
    const h=globes[j], active=j<activeGlobe;
    if (active && h.pop < 0.01) placeHand(h, SPAWN_AHEAD*0.8 + Math.random()*SPAWN_AHEAD*0.2);
    const along=_v.copy(h.pos).sub(plane.position).dot(fwd);
    if (active && along < -DESPAWN_BEHIND) placeHand(h, SPAWN_AHEAD - Math.random()*30);
    h.pop = active ? 1 : h.pop*0.85;
    if (!active && h.pop<0.01){ dummy.position.copy(h.pos); dummy.quaternion.identity(); dummy.scale.setScalar(0.0001); dummy.updateMatrix(); globeMesh.setMatrixAt(j,dummy.matrix); globeOutline.setMatrixAt(j,dummy.matrix); continue; }
    const size=h.baseSize*h.pop*(1+BEAT_PEAK*avg);
    dummy.position.copy(h.pos); dummy.rotation.set(h.rx, h.ry + time*h.spin, h.rz);
    dummy.scale.setScalar(Math.max(size,0.0001)); dummy.updateMatrix(); globeMesh.setMatrixAt(j,dummy.matrix);
    dummy.scale.multiplyScalar(OUTLINE); dummy.updateMatrix(); globeOutline.setMatrixAt(j,dummy.matrix);
  }
  globeMesh.instanceMatrix.needsUpdate = true;
  globeOutline.instanceMatrix.needsUpdate = true;

  // ---- 링 통과 판정 + 점수 + 경로 이탈시 재생성 (수동은 순수 실력, 자석 보정 없음) ----
  const sPlane = _sv.copy(plane.position).sub(pathOrigin).dot(pathFwd);
  for (const r of rings){
    if (r.s < sPlane - 30){ ringHeadS += RING_GAP; placeRingAt(r, ringHeadS); }   // 뒤로 가면 앞으로
    if (!r.passed && lastS < r.s && sPlane >= r.s){                               // 이번 프레임 링 평면 통과?
      r.passed = true;
      if (plane.position.distanceTo(r.pos) < RING_RADIUS){                        // 링 안으로 → 점수 + 부스트 충전
        score++; boost = Math.min(BOOST_MAX, boost + 0.45);   // 링당 충전 (통과 이어가면 부스트 유지)
        bumpCombo();                                          // 콤보 +1
        // 링 통과 → 캐릭터 트릭! (백덤블링/앞공중제비/배럴롤/360/셀카/댄스/폴짝 랜덤)
        jumpT = 0;
        jumpH = 0.7 + Math.random()*0.8;
        jumpTrick = (Math.random()*7)|0;
        jumpDir = Math.random()<0.5 ? -1 : 1;
        jumpTurns = Math.random()<0.5 ? 1 : 2;
        if (jumpTrick===5){ flashEl.classList.remove('on'); void flashEl.offsetWidth; flashEl.classList.add('on'); }  // 셀카 → 플래시!
        r.portal = 0.0001; r.mesh.material.color.setHex(0x9cffe0); r.mesh.material.emissive.setHex(0x20ffb0);
      } else { r.mesh.material.emissive.setHex(0xff2424); breakCombo(); }          // 빗나감 → 빨강 + 콤보 끊김
    }
    if (r.portal > 0){                                                            // 통과 표시: 살짝만 커지며 페이드 (대쉬 착시 제거)
      r.portal = Math.min(1, r.portal + dt*3.0);
      r.mesh.scale.setScalar(1 + r.portal*0.4);
      r.mesh.material.opacity = 1 - r.portal;
    }
  }
  lastS = sPlane;
  if (comboTimer > 0){ comboTimer -= dt; if (comboTimer <= 0) breakCombo(); }   // 일정시간 링 안 통과하면 콤보 리셋
  const u = undul(sPlane);   // 경로 중심선에서 너무 벗어났으면 → 현재 위치/방향에 새 패스
  _cl.copy(pathOrigin).addScaledVector(pathFwd, sPlane).addScaledVector(pathRight, u.lat).addScaledVector(pathUp, u.ver);
  if (!autopilot && plane.position.distanceTo(_cl) > STRAY_MAX) regenPath();   // 오토파일럿 중엔 리셋 안 함

  // 바다/하늘/태양: 카메라 따라옴 (무한 바다)
  sky.position.copy(camera.position);
  ocean.position.x = camera.position.x; ocean.position.z = camera.position.z;
  if (oceanU){ oceanU.uTime.value = time; oceanU.uOff.value.set(ocean.position.x, ocean.position.z); }
  sun.position.set(camera.position.x + 300, camera.position.y + 60, camera.position.z - 1400); // 수평선 근처 고정 방향

  // 비트 블룸 번쩍 (눈 살짝 부심) + 별 반짝 셰머
  beatFlash *= 0.86;
  bloom.strength = 0.5 + beatFlash*1.5 + Math.sin(time*9)*0.04;
  renderer.toneMappingExposure = 1.2 + beatFlash*0.4;

  // camera — 부스트/오토시 캐릭터로 바짝 당겨 크게 (boostCam 보간 = 끊김 없음)
  boostCam += (((boosting||autopilot)?1:0) - boostCam) * 0.08;                         // 부드럽게 (게이지 깜빡여도 안 튐)
  _desired.set(0, 2.4 - 0.2*boostCam, 9 - 4.0*boostCam).applyQuaternion(plane.quaternion).add(plane.position);  // 9→5.0 (가까이갈때 거리)
  camera.position.lerp(_desired, 0.1 + 0.45*boostCam);   // dt 평활화 덕에 빡세게 따라붙어도 안 떨림
  _headW.set(0, 1.2, 0.05).applyQuaternion(plane.quaternion).add(plane.position);      // 캐릭터(머리) 위치
  camTarget.copy(plane.position).addScaledVector(fwd, 12).lerp(_headW, boostCam*0.6);  // 부스트시 캐릭터로 프레이밍 (비행기 전체 보이게)
  camera.up.set(0,1,0).applyQuaternion(plane.quaternion).applyAxisAngle(fwd, bank*0.7);
  camera.lookAt(camTarget);
  const baseFov = 92 - 6*boostCam;                                                     // 살짝 줌인(캐릭터 더 큼)
  camera.fov += (baseFov - camera.fov)*0.08; camera.updateProjectionMatrix();

  // HUD
  updateBoostMeter();
  for (let k=0;k<PAT_N;k++) binBars[k].style.height = (4 + reaction[k]*26)+'px';
}

let smoothDt = 1/60;
function loop() {
  const raw = Math.min(clock.getDelta(), 0.05);
  smoothDt += (raw - smoothDt) * 0.15;   // 프레임시간 평활화 → 일정 속도 → 드르륵 떨림 제거
  update(smoothDt);
  composer.render();
  requestAnimationFrame(loop);
}
loop();

// ====================== PLANET TURBO — 자연풍경 스카이박스 6면 ======================
function makePlanetTurboFaces() {
  const N = 160, S = 2;   // S = 슈퍼샘플 배율 (해상도 ↑, 좌표는 160 공간 유지)
  const face = d => { const cv=document.createElement('canvas'); cv.width=cv.height=N*S; const g=cv.getContext('2d'); g.imageSmoothingEnabled=false; g.scale(S,S); d(g); return cv; };
  const R = (g,x,y,w,h,c)=>{ g.fillStyle=c; g.fillRect(x|0,y|0,w|0,h|0); };
  const bands = (g,arr)=>{ let y=0; for(const b of arr){ R(g,0,y,N,b[0],b[1]); y+=b[0]; } };   // 납작한 색 띠 (8bit)
  // 계단식 원 (안티에일리어싱 없는 레트로 디스크)
  const blockDisc = (g,cx,cy,r,c)=>{ g.fillStyle=c; for(let dy=-r;dy<=r;dy+=2){ const w=Math.sqrt(r*r-dy*dy)|0; R(g,cx-w,cy+dy,w*2,2); } };

  // --- 텍스트 → ASCII 아트 ---
  const _tmp = document.createElement('canvas'), _tx = _tmp.getContext('2d',{willReadFrequently:true});
  function makeAscii(lines, cols, rows, ramp) {
    const tw=cols*4, th=rows*4;
    _tmp.width=tw; _tmp.height=th;
    _tx.fillStyle='#000'; _tx.fillRect(0,0,tw,th);
    _tx.fillStyle='#fff'; _tx.textAlign='center'; _tx.textBaseline='middle';
    const lh=th/lines.length; _tx.font='900 '+Math.floor(lh*0.84)+'px "Arial Black","Arial",sans-serif';
    lines.forEach((t,i)=> _tx.fillText(t, tw/2, lh*(i+0.5)));
    const d=_tx.getImageData(0,0,tw,th).data, cw=tw/cols, ch=th/rows, out=[];
    for (let r=0;r<rows;r++){ let s='';
      for (let c=0;c<cols;c++){
        let acc=0,n=0;
        for (let yy=1;yy<ch;yy+=2) for (let xx=1;xx<cw;xx+=2){ acc+=d[((((r*ch+yy)|0)*tw)+((c*cw+xx)|0))*4]; n++; }
        const a=acc/n;
        s += ramp.length===1 ? (a>80?ramp:' ') : (a<24?' ':ramp[Math.min(ramp.length-1,(a/255*ramp.length)|0)]);
      }
      out.push(s);
    }
    return out;
  }
  const L=['PLANET','TURBO'], CO=34, RO=18;
  const ART = {
    block: makeAscii(L,CO,RO,'█'), hash: makeAscii(L,CO,RO,'#'), ramp: makeAscii(L,CO,RO,' .:-=+*#%@'),
    shade: makeAscii(L,CO,RO,' ░▒▓█'), star: makeAscii(L,CO,RO,'*'), dot: makeAscii(L,CO,RO,'■'),
  };
  // ASCII 텍스트를 면 가득 채움 (글로우 없음 = 블룸 안 묻음, 레트로 1px 그림자만)
  function logo(g, color, shadow, art) {
    g.save(); g.translate(N,0); g.scale(-1,1);
    g.textAlign='left'; g.textBaseline='top';
    g.font='10px monospace'; const cw10=g.measureText('M').width;
    const cols=art[0].length, rows=art.length;
    const fp=Math.min((N-6)/(cols*cw10/10), (N-12)/rows);
    g.font=fp+'px monospace'; const cw=g.measureText('M').width;
    const x0=(N-cols*cw)/2, y0=(N-rows*fp)/2;
    g.fillStyle=shadow; for(let i=0;i<rows;i++) g.fillText(art[i], x0+1, y0+i*fp+1);
    g.fillStyle=color;  for(let i=0;i<rows;i++) g.fillText(art[i], x0, y0+i*fp);
    g.restore();
  }

  // 6면 — 납작한 8bit 레트로 풍경 + 면 가득 ASCII
  const forest = face(g=>{                          // +X 숲
    bands(g,[[40,'#3aae6e'],[28,'#2a8f59'],[N-68,'#1d6e44']]);
    for(let x=0;x<N;x+=14){ R(g,x,96,8,N-96,'#155235'); R(g,x+2,86,4,12,'#1d6e44'); }
    logo(g,'#a6d24f','#16361f',ART.hash);
  });
  const desert = face(g=>{                           // -X 사막
    bands(g,[[44,'#ffcf5e'],[26,'#f0a44e'],[N-70,'#d9863c']]);
    blockDisc(g,112,48,14,'#fff0b0');
    logo(g,'#dcc070','#5a3010',ART.ramp);
  });
  const aurora = face(g=>{                           // +Y 오로라(위)
    bands(g,[[80,'#0a0a22'],[40,'#10204a'],[N-120,'#0a0a22']]);
    for(let i=0;i<60;i++) R(g,(Math.random()*N)|0,(Math.random()*N)|0,2,2, Math.random()<0.3?'#7ad0ff':'#cfe0ff');
    R(g,0,60,N,8,'#1c8a6a'); R(g,0,72,N,6,'#2a6aa8'); R(g,0,82,N,5,'#5a3a9a');
    logo(g,'#5fd0b8','#06281c',ART.star);
  });
  const seaTop = face(g=>{                           // -Y 바다윗면(아래)
    bands(g,[[54,'#1d7fa0'],[40,'#2a9ab2'],[N-94,'#37b8a8']]);
    for(let y=20;y<N;y+=14) R(g,0,y,N,2,'#bdeef0');
    logo(g,'#8fd0d6','#0a3a44',ART.dot);
  });
  const sunset = face(g=>{                           // +Z 바다노을 (히어로)
    bands(g,[[24,'#2a1a4a'],[16,'#5a2a6a'],[14,'#a8395a'],[12,'#d96a3a'],[12,'#e8a85a']]);
    blockDisc(g,104,66,18,'#e8c050');
    R(g,0,80,N,N-80,'#16284e');
    for(let y=80;y<N;y+=6) R(g,0,y,N,2,'#24407a');
    R(g,98,80,8,N-80,'#c89a4a');                       // 햇빛 반사 컬럼
    logo(g,'#e8c258','#3a1428',ART.block);
  });
  const mountain = face(g=>{                          // -Z 산 여명
    bands(g,[[40,'#3a2a6e'],[26,'#8a3a7a'],[20,'#c85a6a'],[N-86,'#e0905a']]);
    for(let i=0;i<6;i++){ const c=['#42305f','#52406f','#5a4a78'][i%3]; const x=i*28-10; g.fillStyle=c; g.beginPath(); g.moveTo(x,N); g.lineTo(x+30,90+i*4); g.lineTo(x+60,N); g.fill(); }
    logo(g,'#e2a6d4','#2a1640',ART.shade);
  });

  return [forest, desert, aurora, seaTop, sunset, mountain]; // +X,-X,+Y,-Y,+Z,-Z
}
