<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PLANET TURBO — Select Game</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    font-family: ui-monospace, "SF Mono", Menlo, monospace;   /* 우리 폰트 (게임 본문과 동일) */
    background: linear-gradient(#bfe6ff 0%, #8fd0f0 38%, #5fb4e6 55%, #3f93d8 70%, #2f73c0 100%);
    color:#fff; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100%; padding:24px; text-align:center;
  }
  /* 떠다니는 햇살 */
  body::before{ content:""; position:fixed; top:-120px; right:-80px; width:380px; height:380px;
    background:radial-gradient(circle, rgba(255,255,255,.9), rgba(255,255,255,0) 60%); pointer-events:none; }

  .turbo{ width:128px; height:128px; margin-bottom:6px; animation:bob 2.6s ease-in-out infinite; filter:drop-shadow(0 8px 0 rgba(0,0,0,.12)); }
  @keyframes bob{ 0%,100%{ transform:translateY(0) rotate(-2deg);} 50%{ transform:translateY(-12px) rotate(2deg);} }

  h1{
    font-family:'Courier New',monospace; font-style:italic;     /* 타이틀 = 콤보/TURBO 라벨과 동일 */
    font-size:clamp(38px,9vw,76px); font-weight:900; letter-spacing:3px; line-height:.95;
    color:#fff; text-shadow:0 4px 0 #e23c3c, 0 8px 0 rgba(0,0,0,.18);
    -webkit-text-stroke:2px #1a2a4a; margin-bottom:4px;
  }
  .sub{ font-size:13px; letter-spacing:6px; text-transform:uppercase; opacity:.85; margin-bottom:30px;
    text-shadow:0 2px 0 rgba(0,0,0,.2); }

  .games{ display:flex; gap:22px; flex-wrap:wrap; justify-content:center; }
  .card{
    width:230px; padding:26px 20px 22px; border-radius:20px;
    background:rgba(255,255,255,.16); border:3px solid rgba(255,255,255,.5);
    backdrop-filter:blur(6px); text-decoration:none; color:#fff;
    box-shadow:0 8px 0 rgba(0,0,0,.15); transition:transform .12s, box-shadow .12s;
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .card.live:hover{ transform:translateY(-6px); box-shadow:0 14px 0 rgba(0,0,0,.18); background:rgba(255,255,255,.26); }
  .card.live:active{ transform:translateY(2px); box-shadow:0 4px 0 rgba(0,0,0,.18); }
  .card .ico{ font-size:60px; line-height:1; filter:drop-shadow(0 4px 0 rgba(0,0,0,.15)); }
  .card .name{ font-family:'Courier New',monospace; font-style:italic; font-size:24px; font-weight:900; letter-spacing:1px; -webkit-text-stroke:1.5px #1a2a4a; }
  .card .desc{ font-size:12px; opacity:.9; min-height:32px; }
  .card .go{ margin-top:4px; font-size:13px; font-weight:800; letter-spacing:1px;
    background:#e23c3c; color:#fff; padding:7px 18px; border-radius:999px; box-shadow:0 3px 0 #9e2020; }

  .card.soon{ opacity:.7; cursor:default; }
  .card.soon .go{ background:#5a6b82; box-shadow:0 3px 0 #34404f; }
  .badge{ position:absolute; transform:translate(78px,-14px) rotate(12deg);
    background:#ffd23c; color:#5a3a00; font-size:10px; font-weight:900; letter-spacing:1px;
    padding:3px 9px; border-radius:6px; box-shadow:0 2px 0 rgba(0,0,0,.2); }
</style>
</head>
<body>

  <!-- 마스코트 (지구본) -->
  <svg class="turbo" viewBox="0 0 100 100" aria-hidden="true">
    <defs><clipPath id="g"><circle cx="50" cy="50" r="44"/></clipPath></defs>
    <circle cx="50" cy="50" r="46" fill="#0a0a0a"/>
    <g clip-path="url(#g)">
      <rect x="0" y="0" width="100" height="100" fill="#a6d6e4"/>
      <ellipse cx="28" cy="30" rx="16" ry="11" fill="#86c25e"/>
      <ellipse cx="74" cy="40" rx="14" ry="13" fill="#86c25e"/>
      <ellipse cx="40" cy="78" rx="13" ry="9" fill="#86c25e"/>
      <g stroke="#3f6f8f" stroke-width=".9" opacity=".8">
        <path d="M20 6 V94 M35 6 V94 M50 6 V94 M65 6 V94 M80 6 V94"/>
        <path d="M6 25 H94 M6 50 H94 M6 75 H94"/>
      </g>
    </g>
    <!-- 얼굴 -->
    <path d="M33 42 Q40 37 46 42" stroke="#111" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M54 42 Q60 37 67 42" stroke="#111" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <ellipse cx="40" cy="52" rx="6.5" ry="8" fill="#fff" stroke="#111" stroke-width="2"/>
    <ellipse cx="60" cy="52" rx="6.5" ry="8" fill="#fff" stroke="#111" stroke-width="2"/>
    <circle cx="41.5" cy="54" r="3.4" fill="#111"/><circle cx="61.5" cy="54" r="3.4" fill="#111"/>
    <circle cx="39.5" cy="51" r="1.3" fill="#fff"/><circle cx="59.5" cy="51" r="1.3" fill="#fff"/>
    <path d="M40 64 Q50 76 60 64 Z" fill="#5a1418" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
    <path d="M42 64 H58 Q50 69 42 64 Z" fill="#fff"/>
    <ellipse cx="51" cy="71" rx="4.5" ry="2.4" fill="#f4889a"/>
  </svg>

  <h1>PLANET&nbsp;TURBO</h1>
  <div class="sub">select game</div>

  <div class="games">
    <a class="card live" href="flight/">
      <div class="ico">✈️</div>
      <div class="name">FLIGHT</div>
      <div class="desc">Soar over the ocean and thread the golden rings. Audio-reactive flight game.</div>
      <div class="go">▶ PLAY</div>
    </a>
    <div class="card soon">
      <span class="badge">SOON</span>
      <div class="ico">🛹</div>
      <div class="name">SKATE</div>
      <div class="desc">Skateboarding game — almost ready</div>
      <div class="go">COMING SOON</div>
    </div>
  </div>

</body>
</html>
