<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PLANET TURBO — Select Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    font-family:'Press Start 2P', ui-monospace, monospace;
    background:linear-gradient(#bfe6ff 0 14%, #a3dbf3 14% 28%, #84cbed 28% 42%,
               #63b6e6 42% 54%, #4596dc 54% 68%, #2f73c0 68% 84%, #235aa0 84% 100%);
    color:#fff; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100%; padding:24px; text-align:center;
  }

  #mascot{ width:190px; height:190px; image-rendering:pixelated; margin-bottom:18px;
    animation:bob 1.1s steps(2) infinite; }
  @keyframes bob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-8px);} }

  h1{
    font-size:clamp(22px,5.5vw,44px); line-height:1.5; letter-spacing:1px;
    color:#fff; text-shadow:4px 0 #e23c3c, 4px 4px #9e2020, 0 4px #1a2a4a, 8px 8px rgba(0,0,0,.25);
    margin-bottom:18px;
  }
  .sub{ font-size:10px; letter-spacing:4px; color:#ffe24a; text-shadow:2px 2px #9e6b00; margin-bottom:34px; }

  .games{ display:flex; gap:26px; flex-wrap:wrap; justify-content:center; }
  .card{
    position:relative; width:212px; padding:24px 16px 20px;
    background:#2f73c0; border:4px solid #fff; outline:4px solid #1a2a4a;
    box-shadow:8px 8px 0 rgba(0,0,0,.3);
    text-decoration:none; color:#fff;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .card.live{ cursor:pointer; transition:transform .08s steps(2); }
  .card.live:hover{ transform:translate(-2px,-4px); background:#3a86d8; }
  .card.live:active{ transform:translate(4px,4px); box-shadow:2px 2px 0 rgba(0,0,0,.3); }
  .card .ico{ width:64px; height:64px; image-rendering:pixelated; }
  .card .name{ font-size:20px; letter-spacing:1px; text-shadow:3px 3px #1a2a4a; }
  .card .tag{ font-size:8px; line-height:1.7; color:#cfe8ff; min-height:26px; }
  .card .go{ font-size:11px; letter-spacing:1px; background:#e23c3c; color:#fff;
    padding:9px 16px; border:3px solid #fff; box-shadow:4px 4px 0 #1a2a4a; }

  .card.soon{ background:#5a6b82; cursor:default; }
  .card.soon .go{ background:#3a4658; }
  .badge{ position:absolute; top:-12px; right:-12px; transform:rotate(8deg);
    background:#ffd23c; color:#5a3a00; font-size:9px; letter-spacing:1px;
    padding:6px 8px; border:3px solid #1a2a4a; box-shadow:3px 3px 0 rgba(0,0,0,.25); }
</style>
</head>
<body>

  <canvas id="mascot" width="64" height="64"></canvas>

  <h1>PLANET<br>TURBO</h1>
  <div class="sub">SELECT GAME</div>

  <div class="games">
    <a class="card live" href="flight/">
      <canvas class="ico" id="ico-fly" width="40" height="40"></canvas>
      <div class="name">FLIGHT</div>
      <div class="tag">RING FLYER<br>AUDIO REACTIVE</div>
      <div class="go">&#9654; PLAY</div>
    </a>
    <div class="card soon">
      <span class="badge">SOON</span>
      <div class="ico" style="font-size:48px;line-height:64px;">🛹</div>
      <div class="name">SKATE</div>
      <div class="tag">ALMOST<br>READY</div>
      <div class="go">LOCKED</div>
    </div>
  </div>

<script>
// 마스코트 = 웃는 지구본 + 흰 장갑 주먹 + 주황 불꽃 후광 (SVG) → 저해상도 래스터화 → 픽셀화
// 불꽃 후광 (별모양 코로나) 좌표 계산
function flameStar(cx, cy, n, rOut, rIn){
  let p=[];
  for(let k=0;k<n*2;k++){
    const a=(k/(n*2))*Math.PI*2 - Math.PI/2;
    const r=(k%2===0)? rOut : rIn;
    p.push((cx+Math.cos(a)*r).toFixed(1)+','+(cy+Math.sin(a)*r).toFixed(1));
  }
  return 'M'+p.join(' L')+' Z';
}
const FLAME_O = flameStar(50,48,11,49,40);   // 바깥 주황
const FLAME_Y = flameStar(50,48,11,44,39);   // 안쪽 노랑
const MASCOT_SVG = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <defs><clipPath id='g'><circle cx='50' cy='48' r='34'/></clipPath></defs>
  <!-- 주황 불꽃 후광 (머리 뒤) -->
  <path d='${FLAME_O}' fill='#ff7a1a'/>
  <path d='${FLAME_Y}' fill='#ffd23c'/>
  <!-- 팔 (검정 누들) + 흰 장갑 주먹 -->
  <path d='M64 58 Q76 50 84 44' stroke='#0a0a0a' stroke-width='6' fill='none' stroke-linecap='round'/>
  <path d='M36 62 Q24 70 16 78' stroke='#0a0a0a' stroke-width='6' fill='none' stroke-linecap='round'/>
  <circle cx='86' cy='42' r='8' fill='#fff' stroke='#0a0a0a' stroke-width='2.5'/>
  <circle cx='14' cy='80' r='8' fill='#fff' stroke='#0a0a0a' stroke-width='2.5'/>
  <!-- 지구본 머리 -->
  <circle cx='50' cy='48' r='37' fill='#0a0a0a'/>
  <g clip-path='url(#g)'>
    <rect x='14' y='12' width='72' height='72' fill='#7fcce6'/>
    <ellipse cx='30' cy='30' rx='13' ry='9' fill='#7ec45a'/>
    <ellipse cx='70' cy='40' rx='12' ry='11' fill='#7ec45a'/>
    <ellipse cx='42' cy='72' rx='11' ry='7' fill='#7ec45a'/>
    <g stroke='#4d86a3' stroke-width='1.4' opacity='.85'>
      <path d='M26 12 V84 M38 12 V84 M50 12 V84 M62 12 V84 M74 12 V84'/>
      <path d='M14 26 H86 M14 38 H86 M14 50 H86 M14 62 H86 M14 74 H86'/>
    </g>
  </g>
  <!-- 얼굴 -->
  <path d='M33 40 Q40 35 46 40' stroke='#111' stroke-width='2.6' fill='none' stroke-linecap='round'/>
  <path d='M54 40 Q60 35 67 40' stroke='#111' stroke-width='2.6' fill='none' stroke-linecap='round'/>
  <ellipse cx='40' cy='50' rx='6.5' ry='8' fill='#fff' stroke='#111' stroke-width='2'/>
  <ellipse cx='60' cy='50' rx='6.5' ry='8' fill='#fff' stroke='#111' stroke-width='2'/>
  <circle cx='41.5' cy='52' r='3.4' fill='#111'/><circle cx='61.5' cy='52' r='3.4' fill='#111'/>
  <circle cx='39.5' cy='49' r='1.3' fill='#fff'/><circle cx='59.5' cy='49' r='1.3' fill='#fff'/>
  <path d='M40 62 Q50 74 60 62 Z' fill='#5a1418' stroke='#111' stroke-width='2' stroke-linejoin='round'/>
  <path d='M42 62 H58 Q50 67 42 62 Z' fill='#fff'/>
  <ellipse cx='51' cy='69' rx='4.5' ry='2.4' fill='#f4889a'/>
</svg>`;

// 작은 비행기 아이콘도 픽셀로 (이모지 대신 통일감)
const PLANE_SVG = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'>
  <g stroke='#0a0a0a' stroke-width='2' stroke-linejoin='round'>
    <rect x='16' y='8' width='8' height='26' rx='2' fill='#e23c3c'/>
    <rect x='3' y='18' width='34' height='6' rx='2' fill='#f0e2b0'/>
    <rect x='13' y='30' width='14' height='5' rx='1.5' fill='#f0e2b0'/>
    <circle cx='20' cy='13' r='3' fill='#bfe8ff'/>
  </g>
  <rect x='17' y='4' width='6' height='3' fill='#33333a'/>
</svg>`;

function pixelDraw(canvas, svg){
  const img = new Image();
  img.onload = () => { const x = canvas.getContext('2d'); x.imageSmoothingEnabled = false;
    x.clearRect(0,0,canvas.width,canvas.height); x.drawImage(img, 0, 0, canvas.width, canvas.height); };
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}
pixelDraw(document.getElementById('mascot'), MASCOT_SVG);
pixelDraw(document.getElementById('ico-fly'), PLANE_SVG);
</script>
</body>
</html>
